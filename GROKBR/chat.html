<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$GrokBRcoin — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;
  --green:#00FF94;
  --purple:#B026FF;
  --red:#FF1744;
  --white:#FFFFFF;
  --card:#080a12;
  --border:rgba(0,255,148,0.1);
}
html,body{height:100%}
body{
  background:radial-gradient(ellipse 130% 55% at 50% -5%,rgba(0,50,20,.75) 0%,transparent 55%),#050508;
  background-attachment:fixed;
  color:var(--white);
  font-family:'Space Grotesk',sans-serif;
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
}

/* NAV */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:64px;flex-shrink:0;
  background:rgba(3,3,8,0.98);
  border-bottom:1px solid var(--border);
  z-index:100;
}
.nav-logo{
  font-family:'Bangers',cursive;font-size:24px;letter-spacing:3px;
  text-transform:uppercase;text-decoration:none;
}
.nav-logo .s{color:var(--green)}
.nav-logo .g{color:#fff}
.nav-logo .b{color:var(--purple)}

.nav-user{display:flex;align-items:center;gap:12px}
.nav-username{
  font-size:13px;font-weight:700;color:var(--green);
  letter-spacing:.5px;
}
.nav-wallet{
  font-size:11px;color:rgba(255,255,255,0.3);
  font-family:monospace;
}
.nav-avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--green),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-family:'Bangers',cursive;font-size:15px;color:#000;
}
.btn-exit{
  background:rgba(255,23,68,0.08);
  border:1px solid rgba(255,23,68,0.25);
  color:rgba(255,23,68,0.7);
  padding:6px 14px;border-radius:8px;
  font-size:12px;font-weight:700;letter-spacing:1px;
  cursor:pointer;transition:all .2s;text-transform:uppercase;
}
.btn-exit:hover{background:rgba(255,23,68,0.15);color:var(--red)}
.btn-delete{
  background:transparent;border:none;
  color:rgba(255,255,255,0.2);
  padding:6px 10px;border-radius:8px;
  font-size:11px;font-weight:600;letter-spacing:1px;
  cursor:pointer;transition:all .2s;text-transform:uppercase;
}
.btn-delete:hover{color:var(--red);background:rgba(255,23,68,0.06)}

/* CONFIRM MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:#0a0c16;border:1px solid rgba(255,23,68,0.25);
  border-radius:20px;padding:36px 32px;max-width:400px;width:90%;
  text-align:center;position:relative;
}
.modal::before{
  content:'';position:absolute;top:-1px;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,var(--red),transparent);
}
.modal-icon{font-size:40px;margin-bottom:12px}
.modal-title{
  font-family:'Bangers',cursive;font-size:28px;letter-spacing:2px;
  color:var(--red);margin-bottom:8px;
}
.modal-text{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:28px}
.modal-text strong{color:rgba(255,255,255,0.8)}
.modal-btns{display:flex;gap:12px}
.modal-cancel{
  flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);
  font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.modal-cancel:hover{background:rgba(255,255,255,0.08);color:#fff}
.modal-confirm{
  flex:1;padding:12px;border-radius:10px;border:none;
  background:var(--red);color:#fff;
  font-family:'Bangers',cursive;font-size:18px;letter-spacing:1px;
  cursor:pointer;transition:all .2s;
}
.modal-confirm:hover{opacity:0.85;transform:scale(1.02)}
.modal-confirm:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* LAYOUT */
.chat-layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{
  width:240px;flex-shrink:0;
  background:rgba(5,5,10,0.9);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-header{
  padding:20px 16px 12px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.sidebar-title{
  font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:rgba(255,255,255,0.3);
}
.online-count{
  font-family:'Bangers',cursive;font-size:22px;
  color:var(--green);letter-spacing:1px;margin-top:4px;
}
.online-label{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px}

.channel{
  padding:10px 16px;
  display:flex;align-items:center;gap:10px;
  background:rgba(0,255,148,0.06);
  border-right:2px solid var(--green);
  cursor:pointer;
}
.channel-hash{color:var(--green);font-family:'Bangers',cursive;font-size:18px}
.channel-name{font-size:13px;font-weight:600;color:rgba(255,255,255,0.8)}

.sidebar-users{flex:1;overflow-y:auto;padding:12px 0}
.sidebar-users::-webkit-scrollbar{width:4px}
.sidebar-users::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.user-item{
  padding:8px 16px;display:flex;align-items:center;gap:10px;
}
.user-dot{
  width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;
  box-shadow:0 0 6px rgba(0,255,148,0.6);
}
.user-name{font-size:13px;color:rgba(255,255,255,0.6)}
.user-wallet-short{font-size:10px;color:rgba(255,255,255,0.25);font-family:monospace}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* MESSAGES */
.messages{
  flex:1;overflow-y:auto;
  padding:24px 24px 8px;
  display:flex;flex-direction:column;gap:2px;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:6px}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

/* DAY SEPARATOR */
.day-sep{
  display:flex;align-items:center;gap:12px;
  margin:16px 0;color:rgba(255,255,255,0.2);font-size:11px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
}
.day-sep::before,.day-sep::after{
  content:'';flex:1;height:1px;background:rgba(255,255,255,0.06);
}

/* MESSAGE */
.msg{
  display:flex;gap:12px;padding:6px 8px;border-radius:8px;
  transition:background .15s;position:relative;
}
.msg:hover{background:rgba(255,255,255,0.025)}
.msg.own:hover{background:rgba(0,255,148,0.04)}

.msg-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;margin-top:2px;
  background:linear-gradient(135deg,var(--green),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-family:'Bangers',cursive;font-size:15px;color:#000;
}
.msg.own .msg-avatar{background:linear-gradient(135deg,var(--green),#00ccff)}

.msg-content{}
.msg-header{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.msg-username{
  font-size:14px;font-weight:700;color:var(--green);
  cursor:pointer;
}
.msg.own .msg-username{color:#00ccff}
.msg-wallet{
  font-size:10px;color:rgba(255,255,255,0.2);font-family:monospace;
}
.msg-time{font-size:11px;color:rgba(255,255,255,0.2)}
.msg-text{
  font-size:14px;line-height:1.6;color:rgba(255,255,255,0.85);
  word-break:break-word;
}

/* SYSTEM MESSAGE */
.msg-system{
  text-align:center;font-size:12px;
  color:rgba(255,255,255,0.25);padding:8px;
  font-style:italic;
}

/* INPUT AREA */
.input-area{
  padding:16px 24px 20px;
  background:rgba(5,5,10,0.8);
  border-top:1px solid rgba(255,255,255,0.06);
}
.input-wrap{
  display:flex;gap:10px;align-items:flex-end;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;padding:10px 14px;
  transition:border-color .2s,box-shadow .2s;
}
.input-wrap:focus-within{
  border-color:rgba(0,255,148,0.3);
  box-shadow:0 0 0 3px rgba(0,255,148,0.06);
}
.msg-input{
  flex:1;background:none;border:none;outline:none;
  color:#fff;font-family:'Space Grotesk',sans-serif;
  font-size:14px;resize:none;max-height:120px;
  line-height:1.5;
}
.msg-input::placeholder{color:rgba(255,255,255,0.2)}
.send-btn{
  background:var(--green);border:none;border-radius:9px;
  width:36px;height:36px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.send-btn:hover{transform:scale(1.08);box-shadow:0 0 20px rgba(0,255,148,0.4)}
.send-btn:active{transform:scale(0.96)}
.send-btn svg{width:16px;height:16px}
.input-footer{
  display:flex;justify-content:space-between;
  margin-top:8px;
  font-size:11px;color:rgba(255,255,255,0.2);
}
.char-count{}
.input-hint-text{}

/* WELCOME BANNER */
.welcome-banner{
  background:linear-gradient(135deg,rgba(0,255,148,0.06),rgba(176,38,255,0.04));
  border:1px solid rgba(0,255,148,0.12);
  border-radius:16px;padding:20px 24px;margin-bottom:16px;
}
.welcome-banner h3{
  font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;
  color:var(--green);margin-bottom:4px;
}
.welcome-banner p{font-size:13px;color:rgba(255,255,255,0.4);line-height:1.5}

/* LOADING */
.loading-msgs{
  display:flex;align-items:center;justify-content:center;
  gap:8px;color:rgba(255,255,255,0.3);font-size:13px;
  padding:40px;
}
.spinner{
  width:18px;height:18px;border:2px solid rgba(0,255,148,0.2);
  border-top-color:var(--green);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .sidebar{display:none}
  nav{padding:0 16px}
  .messages{padding:16px 12px 8px}
  .input-area{padding:12px 12px 16px}
  .nav-wallet{display:none}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="s">$</span><span class="g">Grok</span><span class="b">BR</span><span class="g">coin</span>
  </a>
  <div class="nav-user">
    <div>
      <div class="nav-username" id="nav-username">—</div>
      <div class="nav-wallet" id="nav-wallet">—</div>
    </div>
    <div class="nav-avatar" id="nav-avatar">?</div>
    <button class="btn-exit" onclick="exitChat()">Sair</button>
    <button class="btn-delete" onclick="openDeleteModal()">Excluir conta</button>
  </div>
</nav>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">EXCLUIR CONTA</div>
    <div class="modal-text">
      Isso vai remover <strong>permanentemente</strong> seu username e wallet do sistema.<br><br>
      Esta ação <strong>não pode ser desfeita.</strong>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeDeleteModal()">Cancelar</button>
      <button class="modal-confirm" onclick="deleteAccount()" id="confirm-delete-btn">EXCLUIR</button>
    </div>
  </div>
</div>

<div class="chat-layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Online agora</div>
      <div class="online-count" id="online-count">0</div>
      <div class="online-label">holders conectados</div>
    </div>
    <div class="channel">
      <span class="channel-hash">#</span>
      <span class="channel-name">geral</span>
    </div>
    <div class="sidebar-users" id="sidebar-users">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="loading-msgs">
        <div class="spinner"></div>
        Carregando mensagens...
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="msg-input"
          class="msg-input"
          placeholder="Manda a mensagem..."
          rows="1"
          maxlength="500"
        ></textarea>
        <button class="send-btn" onclick="sendMessage()" id="send-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="input-hint-text">Enter para enviar · Shift+Enter nova linha</span>
        <span class="char-count" id="char-count">0/500</span>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, serverTimestamp, onDisconnect, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getFirestore, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAe4U7a9EhgBl0u4Ku_k7m3QLIcUmFKfcc",
  authDomain: "projeto-8c65b.firebaseapp.com",
  databaseURL: "https://projeto-8c65b-default-rtdb.firebaseio.com",
  projectId: "projeto-8c65b",
  storageBucket: "projeto-8c65b.firebasestorage.app",
  messagingSenderId: "804162714664",
  appId: "1:804162714664:web:724efb10dc3e9e623ec91d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const firestore = getFirestore(app);

// Auth check — redireciona E interrompe execução (redirect é assíncrono)
const wallet = localStorage.getItem('grokbr_wallet');
const username = localStorage.getItem('grokbr_username');

if (!wallet || !username) {
  window.location.replace('register.html');
  throw new Error('not-authenticated');
}

// UI Setup
document.getElementById('nav-username').textContent = username;
document.getElementById('nav-wallet').textContent = wallet.slice(0,6) + '...' + wallet.slice(-4);
document.getElementById('nav-avatar').textContent = username[0].toUpperCase();

// Presence (online users)
const presenceRef = ref(db, 'presence/' + wallet);
set(presenceRef, { username, wallet, joinedAt: Date.now() });
onDisconnect(presenceRef).remove();

// Online users list
const allPresenceRef = ref(db, 'presence');
onValue(allPresenceRef, (snap) => {
  const users = [];
  snap.forEach(child => users.push(child.val()));
  document.getElementById('online-count').textContent = users.length;

  const container = document.getElementById('sidebar-users');
  container.innerHTML = users.map(u => {
    const name = escapeHtml(String(u.username ?? ''));
    const w = String(u.wallet ?? '');
    const walletShort = escapeHtml(w.slice(0,6) + '...' + w.slice(-4));
    return `
    <div class="user-item">
      <div class="user-dot"></div>
      <div>
        <div class="user-name">${name}</div>
        <div class="user-wallet-short">${walletShort}</div>
      </div>
    </div>`;
  }).join('');
});

// Messages
const messagesRef = ref(db, 'messages');
let firstLoad = true;

onValue(messagesRef, (snap) => {
  const container = document.getElementById('messages');
  const msgs = [];
  snap.forEach(child => msgs.push({ id: child.key, ...child.val() }));

  if (firstLoad) {
    container.innerHTML = '';
    firstLoad = false;

    if (msgs.length === 0) {
      container.innerHTML = `
        <div class="welcome-banner">
          <h3>BEM-VINDO AO CHAT</h3>
          <p>Seja o primeiro a mandar uma mensagem. 🚀</p>
        </div>`;
    } else {
      renderMessages(msgs, container);
    }
    scrollToBottom(false);
  } else {
    // New message added
    const last = msgs[msgs.length - 1];
    if (last) appendMessage(last, container);
    scrollToBottom(true);
  }
});

function renderMessages(msgs, container) {
  let lastDate = null;
  msgs.forEach(msg => {
    const msgDate = msg.timestamp ? new Date(msg.timestamp).toLocaleDateString('pt-BR') : null;
    if (msgDate && msgDate !== lastDate) {
      const sep = document.createElement('div');
      sep.className = 'day-sep';
      sep.textContent = msgDate;
      container.appendChild(sep);
      lastDate = msgDate;
    }
    appendMessage(msg, container);
  });
}

function appendMessage(msg, container) {
  if (!msg || !msg.id) return;
  if (container.querySelector(`[data-id="${CSS.escape(msg.id)}"]`)) return; // dedupe upfront
  const isOwn = msg.wallet === wallet;
  const time = msg.timestamp
    ? new Date(msg.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
    : '';
  const name = String(msg.username ?? '?');
  const w = String(msg.wallet ?? '');
  const walletShort = w.slice(0,6) + '...' + w.slice(-4);
  const el = document.createElement('div');
  el.className = 'msg' + (isOwn ? ' own' : '');
  el.dataset.id = msg.id;
  el.innerHTML = `
    <div class="msg-avatar">${escapeHtml((name[0] || '?').toUpperCase())}</div>
    <div class="msg-content">
      <div class="msg-header">
        <span class="msg-username">${escapeHtml(name)}</span>
        <span class="msg-wallet">${escapeHtml(walletShort)}</span>
        <span class="msg-time">${escapeHtml(time)}</span>
      </div>
      <div class="msg-text">${escapeHtml(String(msg.text ?? ''))}</div>
    </div>
  `;
  container.appendChild(el);
}

function scrollToBottom(smooth) {
  const container = document.getElementById('messages');
  container.scrollTo({ top: container.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// Send message
window.sendMessage = async function() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('char-count').textContent = '0/500';

  try {
    await push(messagesRef, {
      wallet,
      username,
      text,
      timestamp: Date.now()
    });
  } catch(e) {
    console.error('Erro ao enviar:', e);
  }
};

// Input auto-resize + char count
const inputEl = document.getElementById('msg-input');
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  document.getElementById('char-count').textContent = inputEl.value.length + '/500';
});

// Enter to send
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    window.sendMessage();
  }
});

// Exit
window.exitChat = function() {
  remove(presenceRef);
  localStorage.removeItem('grokbr_wallet');
  localStorage.removeItem('grokbr_username');
  window.location.href = 'register.html';
};

// Delete account
window.openDeleteModal = function() {
  document.getElementById('delete-modal').classList.add('open');
};
window.closeDeleteModal = function() {
  document.getElementById('delete-modal').classList.remove('open');
};
window.deleteAccount = async function() {
  const btn = document.getElementById('confirm-delete-btn');
  btn.disabled = true;
  btn.textContent = 'EXCLUINDO...';
  try {
    await remove(presenceRef);
    await deleteDoc(doc(firestore, 'users', wallet));
    localStorage.removeItem('grokbr_wallet');
    localStorage.removeItem('grokbr_username');
    window.location.href = 'register.html';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'EXCLUIR';
    alert('Erro ao excluir. Tente novamente.');
  }
};
</script>

</body>
</html>
